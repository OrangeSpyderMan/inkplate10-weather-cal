<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 1540" role="img" aria-label="Rain and temperature chart design options">
  <defs>
    <style>
      .page { fill: #f2f2f2; }
      .card { fill: #fff; stroke: #bbb; stroke-width: 1; }
      .title { font: 700 24px Arial, sans-serif; fill: #000; }
      .body { font: 14px Arial, sans-serif; fill: #333; }
      .option-title { font: 700 17px Arial, sans-serif; fill: #000; }
      .panel-title { font: 700 16px Arial, sans-serif; fill: #000; }
      .chart { fill: #fff; stroke: #ddd; stroke-width: 1; }
      .axis { stroke: #000; stroke-width: 2; }
      .temp-line { fill: none; stroke: #000; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .temp-dot { fill: #fff; stroke: #000; stroke-width: 2; }
      .label { font: 28px cursive; fill: #000; }
      .small-label { font: 24px cursive; fill: #000; }
    </style>
    <pattern id="loose-hatch" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#000" stroke-width="2"/>
    </pattern>
    <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#000"/>
      <circle cx="8" cy="7" r="1.5" fill="#000"/>
    </pattern>
    <pattern id="mini-hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#000" stroke-width="2"/>
    </pattern>
  </defs>

  <rect class="page" width="980" height="1540"/>
  <text class="title" x="24" y="42">Rain and Temperature Chart Options</text>
  <text class="body" x="24" y="68">Static mockups using rain 0%, 1%, 100%, 100%, 80%, 0%, 0% and temperature 22, 20, 18, 15, 14, 13, 13.</text>

  <g transform="translate(24 95)">
    <rect class="card" width="932" height="335"/>
    <text class="option-title" x="16" y="28">Option A: Combined Chart, Honest Rain Scale</text>
    <text class="body" x="16" y="52">Rain uses a 0-100 scale, with a loose hatch so the temperature line still reads.</text>
    <g transform="translate(16 68)">
      <rect class="chart" width="900" height="250"/>
      <line class="axis" x1="30" y1="210" x2="870" y2="210"/>
      <rect x="275" y="20" width="86" height="190" fill="url(#loose-hatch)" stroke="#000" stroke-width="3"/>
      <rect x="395" y="20" width="86" height="190" fill="url(#loose-hatch)" stroke="#000" stroke-width="3"/>
      <rect x="515" y="58" width="86" height="152" fill="url(#loose-hatch)" stroke="#000" stroke-width="3"/>
      <path class="temp-line" d="M88 50 L208 60 L328 72 L448 94 L568 104 L688 110 L808 108"/>
      <circle class="temp-dot" cx="88" cy="50" r="4"/><circle class="temp-dot" cx="208" cy="60" r="4"/><circle class="temp-dot" cx="328" cy="72" r="4"/><circle class="temp-dot" cx="448" cy="94" r="4"/><circle class="temp-dot" cx="568" cy="104" r="4"/><circle class="temp-dot" cx="688" cy="110" r="4"/><circle class="temp-dot" cx="808" cy="108" r="4"/>
      <text class="label" x="58" y="88">22&#176;</text><text class="label" x="178" y="98">20&#176;</text><text class="label" x="298" y="110">18&#176;</text><text class="label" x="418" y="132">15&#176;</text><text class="label" x="538" y="142">14&#176;</text><text class="label" x="658" y="148">13&#176;</text><text class="label" x="778" y="146">13&#176;</text>
      <text class="small-label" x="188" y="240">1%</text><text class="small-label" x="286" y="240">100%</text><text class="small-label" x="406" y="240">100%</text><text class="small-label" x="538" y="240">80%</text>
    </g>
  </g>

  <g transform="translate(24 455)">
    <rect class="card" width="932" height="335"/>
    <text class="option-title" x="16" y="28">Option B: Combined Chart, Stippled Rain Columns</text>
    <text class="body" x="16" y="52">Same honest scale, but stippling gives a lighter e-ink texture behind labels and the line.</text>
    <g transform="translate(16 68)">
      <rect class="chart" width="900" height="250"/>
      <line class="axis" x1="30" y1="210" x2="870" y2="210"/>
      <rect x="275" y="20" width="86" height="190" fill="url(#dots)" stroke="#000" stroke-width="3"/>
      <rect x="395" y="20" width="86" height="190" fill="url(#dots)" stroke="#000" stroke-width="3"/>
      <rect x="515" y="58" width="86" height="152" fill="url(#dots)" stroke="#000" stroke-width="3"/>
      <path class="temp-line" d="M88 50 L208 60 L328 72 L448 94 L568 104 L688 110 L808 108"/>
      <circle class="temp-dot" cx="88" cy="50" r="4"/><circle class="temp-dot" cx="208" cy="60" r="4"/><circle class="temp-dot" cx="328" cy="72" r="4"/><circle class="temp-dot" cx="448" cy="94" r="4"/><circle class="temp-dot" cx="568" cy="104" r="4"/><circle class="temp-dot" cx="688" cy="110" r="4"/><circle class="temp-dot" cx="808" cy="108" r="4"/>
      <text class="label" x="58" y="88">22&#176;</text><text class="label" x="178" y="98">20&#176;</text><text class="label" x="298" y="110">18&#176;</text><text class="label" x="418" y="132">15&#176;</text><text class="label" x="538" y="142">14&#176;</text><text class="label" x="658" y="148">13&#176;</text><text class="label" x="778" y="146">13&#176;</text>
      <text class="small-label" x="188" y="240">1%</text><text class="small-label" x="286" y="240">100%</text><text class="small-label" x="406" y="240">100%</text><text class="small-label" x="538" y="240">80%</text>
    </g>
  </g>

  <g transform="translate(24 815)">
    <rect class="card" width="932" height="385"/>
    <text class="option-title" x="16" y="28">Option C: Two Stacked Mini Charts</text>
    <text class="body" x="16" y="52">Temperature and rain stop competing; this is clearest, but costs vertical space.</text>
    <g transform="translate(16 68)">
      <rect class="chart" width="900" height="300"/>
      <text class="panel-title" x="30" y="25">Temperature</text>
      <line class="axis" x1="30" y1="128" x2="870" y2="128"/>
      <path class="temp-line" d="M88 45 L208 55 L328 67 L448 89 L568 99 L688 105 L808 103"/>
      <circle class="temp-dot" cx="88" cy="45" r="4"/><circle class="temp-dot" cx="208" cy="55" r="4"/><circle class="temp-dot" cx="328" cy="67" r="4"/><circle class="temp-dot" cx="448" cy="89" r="4"/><circle class="temp-dot" cx="568" cy="99" r="4"/><circle class="temp-dot" cx="688" cy="105" r="4"/><circle class="temp-dot" cx="808" cy="103" r="4"/>
      <text class="label" x="58" y="85">22&#176;</text><text class="label" x="178" y="95">20&#176;</text><text class="label" x="298" y="107">18&#176;</text><text class="label" x="418" y="125">15&#176;</text><text class="label" x="538" y="132">14&#176;</text><text class="label" x="658" y="138">13&#176;</text><text class="label" x="778" y="136">13&#176;</text>
      <text class="panel-title" x="30" y="173">Rain</text>
      <line class="axis" x1="30" y1="268" x2="870" y2="268"/>
      <rect x="275" y="178" width="86" height="90" fill="url(#mini-hatch)" stroke="#000" stroke-width="3"/>
      <rect x="395" y="178" width="86" height="90" fill="url(#mini-hatch)" stroke="#000" stroke-width="3"/>
      <rect x="515" y="196" width="86" height="72" fill="url(#mini-hatch)" stroke="#000" stroke-width="3"/>
      <text class="small-label" x="188" y="293">1%</text><text class="small-label" x="286" y="293">100%</text><text class="small-label" x="406" y="293">100%</text><text class="small-label" x="538" y="293">80%</text>
    </g>
  </g>

  <g transform="translate(24 1225)">
    <rect class="card" width="932" height="295"/>
    <text class="option-title" x="16" y="28">Option D: Keep Current Height, Make Compression Explicit</text>
    <text class="body" x="16" y="52">Least visual change: keep rain capped around half-height and document it as readability compression.</text>
    <g transform="translate(16 68)">
      <rect class="chart" width="900" height="210"/>
      <line class="axis" x1="30" y1="170" x2="870" y2="170"/>
      <rect x="275" y="84" width="86" height="86" fill="url(#mini-hatch)" stroke="#000" stroke-width="3"/>
      <rect x="395" y="84" width="86" height="86" fill="url(#mini-hatch)" stroke="#000" stroke-width="3"/>
      <rect x="515" y="101" width="86" height="69" fill="url(#mini-hatch)" stroke="#000" stroke-width="3"/>
      <path class="temp-line" d="M88 35 L208 45 L328 57 L448 79 L568 89 L688 95 L808 93"/>
      <circle class="temp-dot" cx="88" cy="35" r="4"/><circle class="temp-dot" cx="208" cy="45" r="4"/><circle class="temp-dot" cx="328" cy="57" r="4"/><circle class="temp-dot" cx="448" cy="79" r="4"/><circle class="temp-dot" cx="568" cy="89" r="4"/><circle class="temp-dot" cx="688" cy="95" r="4"/><circle class="temp-dot" cx="808" cy="93" r="4"/>
      <text class="label" x="58" y="73">22&#176;</text><text class="label" x="178" y="83">20&#176;</text><text class="label" x="298" y="95">18&#176;</text><text class="label" x="418" y="117">15&#176;</text><text class="label" x="538" y="127">14&#176;</text><text class="label" x="658" y="133">13&#176;</text><text class="label" x="778" y="131">13&#176;</text>
      <text class="small-label" x="188" y="200">1%</text><text class="small-label" x="286" y="200">100%</text><text class="small-label" x="406" y="200">100%</text><text class="small-label" x="538" y="200">80%</text>
    </g>
  </g>
</svg>
