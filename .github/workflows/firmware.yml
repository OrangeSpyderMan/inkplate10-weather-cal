name: Firmware CI

on:
  push:
    paths:
      - 'src/**'
      - 'Makefile'
      - 'bin/install_arduino_cli.sh'
      - 'bin/generate_firmware_config.py'
      - 'bin/generate_firmware_version.py'
      - 'firmware-config.example.yaml'
      - '.github/workflows/firmware.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'Makefile'
      - 'bin/install_arduino_cli.sh'
      - 'bin/generate_firmware_config.py'
      - 'bin/generate_firmware_version.py'
      - 'firmware-config.example.yaml'
      - '.github/workflows/firmware.yml'
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FIRMWARE_VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@81d310742121c928ea9c8bbd407b4217b432ae02 # v2.0.0

      - name: Cache Arduino packages and libraries
        uses: actions/cache@v5
        with:
          path: |
            ~/.arduino15
            build/sketchbook
          key: arduino-${{ runner.os }}-${{ hashFiles('Makefile', 'bin/install_arduino_cli.sh') }}
          restore-keys: |
            arduino-${{ runner.os }}-

      - name: Install platforms and libraries
        run: |
          make firmware-setup

      - name: Compile firmware
        run: |
          # No CONFIG is supplied: release firmware remains the generic
          # SD-card-configured variant.
          make firmware-compile FIRMWARE_VERSION="$FIRMWARE_VERSION"

      - name: Compile embedded-config firmware
        run: |
          make firmware-compile CONFIG=firmware-config.example.yaml FIRMWARE_VERSION="$FIRMWARE_VERSION"

      - name: Collect firmware binaries
        run: |
          mkdir -p firmware_binaries

          cp build/arduino-sd/src.ino.bin firmware_binaries/inkplate10-firmware.bin
          cp build/arduino-sd/src.ino.partitions.bin firmware_binaries/inkplate10-partitions.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: inkplate10-firmware
          path: firmware_binaries/*

  publish-release:
    if: github.event_name == 'release'
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v8
        with:
          name: inkplate10-firmware
          path: firmware_binaries

      - name: Upload firmware release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload \
            "${{ github.event.release.tag_name }}" \
            firmware_binaries/* \
            --clobber \
            --repo "${{ github.repository }}"
