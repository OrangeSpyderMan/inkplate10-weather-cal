name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v3.2.0
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: release-management
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout next
        uses: actions/checkout@v7
        with:
          ref: next
          fetch-depth: 0

      - name: Validate release
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use stable SemVer form vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

          git fetch origin main next --tags

          if git rev-parse --verify --quiet "refs/tags/$VERSION"; then
            echo "Tag $VERSION already exists" >&2
            exit 1
          fi

          if ! git merge-base --is-ancestor origin/main origin/next; then
            echo "next does not contain main. Merge the latest main into next first." >&2
            exit 1
          fi

          if git diff --quiet origin/main...origin/next; then
            echo "There are no unreleased changes between main and next" >&2
            exit 1
          fi

          latest="$(
            git tag \
              --merged origin/main \
              --list 'v[0-9]*' \
              --sort=-version:refname |
              head -n 1
          )"
          if [ -n "$latest" ]; then
            newest="$(printf '%s\n%s\n' "$latest" "$VERSION" | sort -V | tail -n 1)"
            if [ "$newest" != "$VERSION" ] || [ "$latest" = "$VERSION" ]; then
              echo "Version $VERSION must be newer than $latest" >&2
              exit 1
            fi
          fi

      - name: Open release pull request
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          existing_pr="$(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head next \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [ -n "$existing_pr" ]; then
            echo "Release pull request #$existing_pr is already open"
            exit 0
          fi

          notes="$(mktemp)"
          cat > "$notes" <<EOF
          ## Summary

          Promote the accumulated \`next\` changes to \`main\` for **$VERSION**.

          ## Comparison

          https://github.com/$GITHUB_REPOSITORY/compare/main...next

          ## Release checklist

          - [ ] Review user-facing and configuration changes
          - [ ] Confirm required CI checks pass
          - [ ] Merge this PR using a merge commit
          - [ ] Run the **Publish Release** workflow for \`$VERSION\`

          The publish workflow creates the GitHub Release, dispatches the
          versioned firmware and container builds, and opens the synchronization
          PR back to \`next\`.
          EOF

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head next \
            --title "Prepare $VERSION release" \
            --body-file "$notes"
