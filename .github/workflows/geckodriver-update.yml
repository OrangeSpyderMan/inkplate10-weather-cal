name: Geckodriver Update

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * 1"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout next
        uses: actions/checkout@v4
        with:
          ref: next

      - name: Check latest Geckodriver release
        id: geckodriver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current="$(sed -n 's/^ARG GECKOVERSION=\(v[0-9][^[:space:]]*\)$/\1/p' Dockerfile)"
          latest="$(gh api repos/mozilla/geckodriver/releases/latest --jq .tag_name)"

          if [ -z "$current" ]; then
            echo "Could not read current GECKOVERSION from Dockerfile" >&2
            exit 1
          fi
          if [ -z "$latest" ]; then
            echo "Could not read latest Geckodriver release from GitHub" >&2
            exit 1
          fi

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

          if [ "$current" = "$latest" ]; then
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Geckodriver pin
        if: steps.geckodriver.outputs.update_needed == 'true'
        env:
          LATEST_GECKODRIVER: ${{ steps.geckodriver.outputs.latest }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          from pathlib import Path

          latest = os.environ["LATEST_GECKODRIVER"]
          replacements = {
              Path("Dockerfile"): (
                  "ARG GECKOVERSION=",
                  f"ARG GECKOVERSION={latest}",
              ),
              Path("docker-compose.yml"): (
                  "        GECKOVERSION: ",
                  f"        GECKOVERSION: {latest}",
              ),
          }

          for path, (prefix, replacement) in replacements.items():
              lines = path.read_text().splitlines()
              updated = False
              for index, line in enumerate(lines):
                  if line.startswith(prefix):
                      lines[index] = replacement
                      updated = True
                      break
              if not updated:
                  raise SystemExit(f"Could not update {path}")
              path.write_text("\n".join(lines) + "\n")
          PY

      - name: Create pull request
        if: steps.geckodriver.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST_GECKODRIVER: ${{ steps.geckodriver.outputs.latest }}
          CURRENT_GECKODRIVER: ${{ steps.geckodriver.outputs.current }}
        run: |
          set -euo pipefail

          branch="chore/geckodriver-${LATEST_GECKODRIVER}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$branch"
          git add Dockerfile docker-compose.yml
          git commit -m "chore: update geckodriver to ${LATEST_GECKODRIVER}"
          git push --force-with-lease origin "$branch"

          existing_pr_count="$(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --base next \
              --head "$branch" \
              --json number \
              --jq length
          )"

          if [ "$existing_pr_count" != "0" ]; then
            echo "Pull request for $branch already exists"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base next \
              --head "$branch" \
              --title "chore: update geckodriver to ${LATEST_GECKODRIVER}" \
              --body "Updates Geckodriver from ${CURRENT_GECKODRIVER} to ${LATEST_GECKODRIVER}."
          fi

      - name: No update needed
        if: steps.geckodriver.outputs.update_needed == 'false'
        run: echo "Geckodriver is already current at ${{ steps.geckodriver.outputs.current }}"
