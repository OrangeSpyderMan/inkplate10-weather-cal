name: Docker Image CI

permissions:
  contents: read

on:
  push:
    paths:
      - 'bin/install_server.py'
      - 'bin/generate_version_manifest.py'
      - 'bin/install_proxmox'
      - 'bin/install_proxmox.py'
      - 'bin/deploy_proxmox_oci'
      - 'bin/deploy_proxmox_oci.py'
      - 'bin/install_remote'
      - 'bin/install_remote.py'
      - 'server/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.env.example'
      - '.github/workflows/docker-image.yml'
  pull_request:
    paths:
      - 'bin/install_server.py'
      - 'bin/generate_version_manifest.py'
      - 'bin/install_proxmox'
      - 'bin/install_proxmox.py'
      - 'bin/deploy_proxmox_oci'
      - 'bin/deploy_proxmox_oci.py'
      - 'bin/install_remote'
      - 'bin/install_remote.py'
      - 'server/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.env.example'
      - '.github/workflows/docker-image.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Test installer helpers
        run: python3 -m unittest discover -s tests -v

      - name: Generate version manifest
        run: python3 bin/generate_version_manifest.py

      - name: Validate Docker Compose config
        env:
          WEATHER_API_KEY: dummy-weather-key
          GOOGLE_API_KEY: dummy-google-key
          GOOGLE_STATICMAPS_MAPID: dummy-map-id
        run: docker compose config

      - name: Build the Docker image
        run: |
          docker build . \
            --file Dockerfile \
            --tag "inkplate10-weather-cal:ci"

      - name: Smoke test Docker image
        env:
          IMAGE: inkplate10-weather-cal:ci
        run: |
          test "$(docker image inspect "$IMAGE" \
            --format '{{json .Config.Cmd}}')" = \
            '["/srv/inkplate/server/container_entrypoint.py"]'
          test "$(docker run --rm "$IMAGE" \
            python3 -c \
            'import json; print(json.load(open(".version.json"))["revision"])')" = \
            "$(git rev-parse --short HEAD)"
          test "$(docker image inspect "$IMAGE" \
            --format '{{index .Config.Labels "org.opencontainers.image.variant"}}')" = \
            "pillow"
          docker run --rm "$IMAGE" python3 -m py_compile \
            server/server.py \
            server/server_status.py \
            server/web.py \
            server/web_server.py \
            server/mqtt_diagnostics_server.py \
            server/container_entrypoint.py \
            server/configuration.py \
            server/artifacts.py \
            server/output_profiles.py \
            server/pillow_renderer.py \
            server/renderers.py \
            server/mqtt_diagnostics.py \
            server/mqtt_publisher.py \
            server/utils.py \
            server/weather/openweathermapv4/openweathermapv4.py
          docker run --rm "$IMAGE" \
            python3 -m unittest discover -s server/tests -v
          if docker run --rm "$IMAGE" python3 -c 'import airium, selenium'; then
            echo "Image unexpectedly contains removed browser dependencies" >&2
            exit 1
          fi
          docker run --rm -e PYTHONPATH=server "$IMAGE" python3 -c \
            'from renderers import build_renderer; build_renderer("pillow")'
          if output="$(docker run --rm -e PYTHONPATH=server "$IMAGE" python3 -c \
            'from renderers import build_renderer; build_renderer("firefox")' \
            2>&1)"; then
            echo "Firefox renderer unexpectedly available" >&2
            exit 1
          fi
          echo "$output" | grep -q "removed in v4"

      - name: Smoke test Gunicorn web service
        env:
          IMAGE: inkplate10-weather-cal:ci
        run: |
          mkdir -p "$RUNNER_TEMP/inkplate-data"
          cat > "$RUNNER_TEMP/inkplate-config.yaml" <<'EOF'
          server:
            enabled: true
            port: 8080
          EOF
          cat > "$RUNNER_TEMP/inkplate-data/weather.json" <<'EOF'
          {"schema_version":"2.0","generated_at":"2026-06-09T00:00:00+00:00","current":{},"hourly":[]}
          EOF
          mkdir -p "$RUNNER_TEMP/inkplate-data/outputs/inkplate10-portrait"
          printf '\211PNG\r\n\032\n' > "$RUNNER_TEMP/inkplate-data/outputs/inkplate10-portrait/calendar.png"
          python3 - <<'PY'
          import json
          import hashlib
          import os
          from pathlib import Path

          root = Path(os.environ["RUNNER_TEMP"]) / "inkplate-data"

          def artifact(path):
              stat = path.stat()
              sha256 = hashlib.sha256(path.read_bytes()).hexdigest()
              return {
                  "path": str(path.relative_to(root)),
                  "signature": {
                      "mtime_ns": stat.st_mtime_ns,
                      "size": stat.st_size,
                  },
                  "sha256": sha256,
              }

          ready = {
              "generated_at": "2026-06-09T00:00:00+00:00",
              "snapshot": artifact(root / "weather.json"),
              "outputs": {
                  "inkplate10-portrait": artifact(
                      root / "outputs/inkplate10-portrait/calendar.png"
                  )
              },
          }
          (root / "ready.json").write_text(json.dumps(ready), encoding="utf-8")
          (root / "server-status.json").write_text(json.dumps({
              "schema_version": "1.0",
              "updated_at": "2026-06-09T00:00:00+00:00",
              "producer": {"state": "ready"},
              "readiness": {},
          }), encoding="utf-8")
          PY
          docker run --rm -d --name inkplate-web-ci \
            -p 18080:8080 \
            -e INKPLATE_CONFIG_FILE=/config.yaml \
            -v "$RUNNER_TEMP/inkplate-config.yaml:/config.yaml:ro" \
            -v "$RUNNER_TEMP/inkplate-data:/srv/inkplate/server/data:ro" \
            "$IMAGE" \
            python3 server/web_server.py
          trap 'docker rm -f inkplate-web-ci >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18080/api/v1/ready >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail http://127.0.0.1:18080/api/v1/health
          curl --fail http://127.0.0.1:18080/api/v1/ready
          curl --fail http://127.0.0.1:18080/api/v1/weather
          curl --fail http://127.0.0.1:18080/api/v1/status
          curl --fail http://127.0.0.1:18080/status
          curl --fail http://127.0.0.1:18080/outputs/inkplate10-portrait/calendar.png
          curl --fail http://127.0.0.1:18080/calendar.png
